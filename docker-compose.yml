services:
  api:
    image: ${BREVYN_CLOUD_IMAGE:-ghcr.io/koiai777/brevyn-cloud:latest}
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:?set APP_ENV in .env}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-30}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-2}
      BACKUP_DIR: ${BACKUP_DIR:-/app/backups/postgres}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      ALLOW_ADMIN_DB_RESTORE: ${ALLOW_ADMIN_DB_RESTORE:-false}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL in .env}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:?set ADMIN_BASE_URL in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      ADMIN_WEB_DIR: ${ADMIN_WEB_DIR:-/app/web/admin/dist}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:?set ADMIN_SEED_EMAIL in .env}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?set ADMIN_SEED_PASSWORD in .env}
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-http://host.docker.internal:8080}
      SUB2API_ADMIN_API_KEY: ${SUB2API_ADMIN_API_KEY:-}
      SUB2API_ADMIN_EMAIL: ${SUB2API_ADMIN_EMAIL:-}
      SUB2API_ADMIN_PASSWORD: ${SUB2API_ADMIN_PASSWORD:-}
      SUB2API_DEFAULT_GROUP_ID: ${SUB2API_DEFAULT_GROUP_ID:-0}
      REGISTER_PROVISION_CONCURRENCY: ${REGISTER_PROVISION_CONCURRENCY:-5}
      SUB2API_KEY_CREATE_RATE_PER_MINUTE: ${SUB2API_KEY_CREATE_RATE_PER_MINUTE:-15}
      SUB2API_KEY_CREATE_CONCURRENCY: ${SUB2API_KEY_CREATE_CONCURRENCY:-3}
      OFFICIAL_PROVIDER_BASE_URL: ${OFFICIAL_PROVIDER_BASE_URL:?set OFFICIAL_PROVIDER_BASE_URL in .env}
      OFFICIAL_PROVIDER_DEFAULT_MODEL: ${OFFICIAL_PROVIDER_DEFAULT_MODEL:-}
      DEVICE_SOFT_LIMIT: ${DEVICE_SOFT_LIMIT:-3}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./backups:/app/backups
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: ${BREVYN_CLOUD_IMAGE:-ghcr.io/koiai777/brevyn-cloud:latest}
    build:
      context: .
    command: ["brevyn-migrate"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:?set APP_ENV in .env}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-1}
      BACKUP_DIR: ${BACKUP_DIR:-/app/backups/postgres}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      ALLOW_ADMIN_DB_RESTORE: ${ALLOW_ADMIN_DB_RESTORE:-false}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL in .env}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:?set ADMIN_BASE_URL in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:?set ADMIN_SEED_EMAIL in .env}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?set ADMIN_SEED_PASSWORD in .env}
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-http://host.docker.internal:8080}
      SUB2API_ADMIN_API_KEY: ${SUB2API_ADMIN_API_KEY:-}
      SUB2API_ADMIN_EMAIL: ${SUB2API_ADMIN_EMAIL:-}
      SUB2API_ADMIN_PASSWORD: ${SUB2API_ADMIN_PASSWORD:-}
      SUB2API_DEFAULT_GROUP_ID: ${SUB2API_DEFAULT_GROUP_ID:-0}
      OFFICIAL_PROVIDER_BASE_URL: ${OFFICIAL_PROVIDER_BASE_URL:?set OFFICIAL_PROVIDER_BASE_URL in .env}
      OFFICIAL_PROVIDER_DEFAULT_MODEL: ${OFFICIAL_PROVIDER_DEFAULT_MODEL:-}
      DEVICE_SOFT_LIMIT: ${DEVICE_SOFT_LIMIT:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ${BREVYN_CLOUD_IMAGE:-ghcr.io/koiai777/brevyn-cloud:latest}
    build:
      context: .
    command: ["brevyn-worker"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:?set APP_ENV in .env}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL in .env}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:?set ADMIN_BASE_URL in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env}
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      POSTGRES_MIN_CONNS: ${POSTGRES_MIN_CONNS:-1}
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-http://host.docker.internal:8080}
      SUB2API_ADMIN_API_KEY: ${SUB2API_ADMIN_API_KEY:-}
      SUB2API_ADMIN_EMAIL: ${SUB2API_ADMIN_EMAIL:-}
      SUB2API_ADMIN_PASSWORD: ${SUB2API_ADMIN_PASSWORD:-}
      SUB2API_DEFAULT_GROUP_ID: ${SUB2API_DEFAULT_GROUP_ID:-0}
      SUB2API_OPERATION_CONCURRENCY: ${SUB2API_OPERATION_CONCURRENCY:-3}
      SUB2API_OPERATION_BATCH_SIZE: ${SUB2API_OPERATION_BATCH_SIZE:-10}
      SUB2API_OPERATION_INTERVAL: ${SUB2API_OPERATION_INTERVAL:-10s}
      SUB2API_OPERATION_STALE_TIMEOUT: ${SUB2API_OPERATION_STALE_TIMEOUT:-5m}
      SUB2API_KEY_CREATE_RATE_PER_MINUTE: ${SUB2API_KEY_CREATE_RATE_PER_MINUTE:-15}
      SUB2API_KEY_CREATE_CONCURRENCY: ${SUB2API_KEY_CREATE_CONCURRENCY:-3}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:?set ADMIN_SEED_EMAIL in .env}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?set ADMIN_SEED_PASSWORD in .env}
      OFFICIAL_PROVIDER_BASE_URL: ${OFFICIAL_PROVIDER_BASE_URL:?set OFFICIAL_PROVIDER_BASE_URL in .env}
      OFFICIAL_PROVIDER_DEFAULT_MODEL: ${OFFICIAL_PROVIDER_DEFAULT_MODEL:-}
      DEVICE_SOFT_LIMIT: ${DEVICE_SOFT_LIMIT:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: brevyn_cloud
      POSTGRES_USER: brevyn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brevyn -d brevyn_cloud"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
